<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Apiaro Admin</title>

    
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


    <style>
    @media (max-width: 768px) {
        #admin-sidebar { position: fixed !important; top: 0 !important; left: -260px !important; width: 260px !important; height: 100vh !important; z-index: 1000 !important; transition: left 0.3s ease !important; }
        #admin-sidebar.active, #admin-sidebar[style*="left: 0px"] { left: 0 !important; }
        #admin-ham { display: block !important; }
        .main-content { margin-left: 0 !important; padding-top: 60px !important; width: 100% !important; }
    }
    </style>
</head>
<body>
    <button class="admin-hamburger" onclick="toggleSidebar()">☰</button>
    <div class="sidebar-overlay" onclick="toggleSidebar()" id="admin-sidebar" style="position:fixed;top:0;left:-260px;width:260px;height:100vh;background:var(--dark);color:white;z-index:1000;transition:left 0.3s ease;overflow-y:auto;"></div>
    <div class="admin-layout">
        <aside class="sidebar" id="admin-sidebar" style="position:fixed;top:0;left:-260px;width:260px;height:100vh;background:var(--dark);color:white;z-index:1000;transition:left 0.3s ease;overflow-y:auto;">
            <div class="sidebar-header" id="admin-sidebar" style="position:fixed;top:0;left:-260px;width:260px;height:100vh;background:var(--dark);color:white;z-index:1000;transition:left 0.3s ease;overflow-y:auto;">
                <h2><i class="fas fa-shopping-bag"></i> Apiaro</h2>
                <p>Admin Panel</p>
            </div>
            <nav class="sidebar-nav" id="admin-sidebar" style="position:fixed;top:0;left:-260px;width:260px;height:100vh;background:var(--dark);color:white;z-index:1000;transition:left 0.3s ease;overflow-y:auto;">
                <a href="index.html"><i class="fas fa-home"></i> Dashboard</a>
                <a href="products.html"><i class="fas fa-box"></i> Products</a>
                <a href="orders.html"><i class="fas fa-clipboard-list"></i> Orders</a>
                <a href="users.html" class="active"><i class="fas fa-users"></i> Users</a>
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="admin-header">
                <h1>User Management</h1>
                <div class="stats-summary">
                    <span id="total-users">0 Users</span>
                </div>
            </header>

            <div class="users-table-container">
                <div class="debug-info" id="debug-info" style="background: #f0f0f0; padding: 10px; margin-bottom: 10px; font-family: monospace; font-size: 12px; display: none;">
                    Debug info will appear here
                </div>
                <div class="table-responsive">
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Full Name</th>
                                <th>Email</th>
                                <th>Phone Number</th>
                                <th>Registered Date</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    

    <script>
    (function(){
        var sb = document.getElementById('admin-sidebar');
        var ham = document.getElementById('admin-ham');
        var ov = document.getElementById('admin-overlay');
        
        window.toggleSidebar = function() {
            if (!sb) { alert('Sidebar not found!'); return; }
            var isOpen = sb.style.left === '0px';
            if (isOpen) {
                sb.style.left = '-260px';
                if (ov) ov.style.display = 'none';
                document.body.style.overflow = '';
            } else {
                sb.style.left = '0px';
                if (ov) ov.style.display = 'block';
                document.body.style.overflow = 'hidden';
            }
        };
        
        // Show hamburger on mobile
        function checkMobile() {
            if (ham) {
                if (window.innerWidth <= 768) {
                    ham.style.display = 'block';
                } else {
                    ham.style.display = 'none';
                    // Reset sidebar on desktop
                    if (sb) sb.style.left = '';
                    if (ov) ov.style.display = 'none';
                    document.body.style.overflow = '';
                }
            }
        }
        
        window.addEventListener('resize', checkMobile);
        document.addEventListener('DOMContentLoaded', checkMobile);
        
        // Close sidebar when clicking links
        if (sb) {
            sb.querySelectorAll('a').forEach(function(a){
                a.addEventListener('click', function(){
                    if (window.innerWidth <= 768) toggleSidebar();
                });
            });
        }
    })();
    </script>
</body>
</html>
