<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Apiaro</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <i class="fas fa-lock logo-icon"></i>
                <h1>Admin Panel</h1>
                <p>Authorized personnel only</p>
            </div>
            
            <form id="admin-login-form" class="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required value="admin@kenyashop.co.ke">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required value="admin123">
                </div>
                <button type="submit" class="btn-auth" id="login-btn">Login to Dashboard</button>
                <div id="error-message" style="color: red; margin-top: 10px; display: none;"></div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const errorDiv = document.getElementById('error-message');
            const btn = document.getElementById('login-btn');
            errorDiv.style.display = 'none';
            
            const originalText = btn.textContent;
            btn.textContent = 'Signing in...';
            btn.disabled = true;
            
            const credentials = {
                email: document.getElementById('email').value.trim().toLowerCase(),
                password: document.getElementById('password').value
            };
            
            try {
                const response = await fetch('https://apiaro-backend.onrender.com/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(credentials)
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    errorDiv.textContent = data.detail || 'Login failed';
                    errorDiv.style.display = 'block';
                    btn.textContent = originalText;
                    btn.disabled = false;
                    return;
                }
                
                // CRITICAL: Verify this is actually an admin
                if (!data.user || !data.user.is_admin) {
                    errorDiv.textContent = 'Access denied. Admin privileges required.';
                    errorDiv.style.display = 'block';
                    btn.textContent = originalText;
                    btn.disabled = false;
                    return;
                }
                
                // Store admin session
                localStorage.setItem('admin_token', data.access_token);
                localStorage.setItem('admin_user', JSON.stringify(data.user));
                
                window.location.href = 'index.html';
                
            } catch (error) {
                errorDiv.textContent = 'Network error: ' + error.message;
                errorDiv.style.display = 'block';
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
