<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - KenyaShop</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <i class="fas fa-lock logo-icon"></i>
                <h1>Admin Panel</h1>
                <p>Authorized personnel only</p>
            </div>
            
            <form id="admin-login-form" class="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required value="admin@kenyashop.co.ke">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required value="admin123">
                </div>
                <button type="submit" class="btn-auth">Login to Dashboard</button>
                <div id="error-message" style="color: red; margin-top: 10px; display: none;"></div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const errorDiv = document.getElementById('error-message');
            errorDiv.style.display = 'none';
            
            const credentials = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            
            try {
                console.log('Attempting login with:', credentials.email);
                
                const response = await fetch('http://localhost:8000/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(credentials)
                });
                
                const data = await response.json();
                console.log('Login response:', response.status, data);
                
                if (response.ok && data.access_token) {
                    localStorage.setItem('admin_token', data.access_token);
                    console.log('Token stored successfully');
                    window.location.href = 'index.html';
                } else {
                    errorDiv.textContent = 'Login failed: ' + (data.detail || 'Invalid credentials');
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Network error: ' + error.message;
                errorDiv.style.display = 'block';
                console.error('Login error:', error);
            }
        });
    </script>
</body>
</html>
