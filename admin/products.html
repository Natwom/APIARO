<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management - Apiaro Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
    @media (max-width: 768px) {
        #admin-sidebar { position: fixed !important; top: 0 !important; left: -260px !important; width: 260px !important; height: 100vh !important; z-index: 1000 !important; transition: left 0.3s ease !important; }
        #admin-sidebar.active, #admin-sidebar[style*="left: 0px"] { left: 0 !important; }
        #admin-ham { display: block !important; }
        .main-content { margin-left: 0 !important; padding-top: 60px !important; width: 100% !important; }
    }
    </style>
</head>
<body>
    <button class="admin-hamburger" onclick="toggleSidebar()">☰</button>
    <div class="sidebar-overlay" onclick="toggleSidebar()" id="admin-sidebar" style="position:fixed;top:0;left:-260px;width:260px;height:100vh;background:var(--dark);color:white;z-index:1000;transition:left 0.3s ease;overflow-y:auto;"></div>
    <div class="admin-layout">
        <aside class="sidebar" id="admin-sidebar" style="position:fixed;top:0;left:-260px;width:260px;height:100vh;background:var(--dark);color:white;z-index:1000;transition:left 0.3s ease;overflow-y:auto;">
            <div class="sidebar-header" id="admin-sidebar" style="position:fixed;top:0;left:-260px;width:260px;height:100vh;background:var(--dark);color:white;z-index:1000;transition:left 0.3s ease;overflow-y:auto;">
                <h2><i class="fas fa-shopping-bag"></i> Apiaro</h2>
                <p>Admin Panel</p>
            </div>
            <nav class="sidebar-nav" id="admin-sidebar" style="position:fixed;top:0;left:-260px;width:260px;height:100vh;background:var(--dark);color:white;z-index:1000;transition:left 0.3s ease;overflow-y:auto;">
                <a href="index.html"><i class="fas fa-home"></i> Dashboard</a>
                <a href="products.html" class="active"><i class="fas fa-box"></i> Products</a>
                <a href="orders.html"><i class="fas fa-clipboard-list"></i> Orders</a>
                <a href="users.html"><i class="fas fa-users"></i> Users</a>
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="admin-header">
                <h1>Product Management</h1>
                <button onclick="openAddModal()" class="btn-primary">
                    <i class="fas fa-plus"></i> Add New Product
                </button>
            </header>

            <div class="products-stats">
                <div class="stat-card">
                    <i class="fas fa-box"></i>
                    <div>
                        <h3 id="total-products">0</h3>
                        <p>Total Products</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-check-circle"></i>
                    <div>
                        <h3 id="active-products">0</h3>
                        <p>Active</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-exclamation-circle"></i>
                    <div>
                        <h3 id="low-stock">0</h3>
                        <p>Low Stock</p>
                    </div>
                </div>
            </div>

            <div class="products-table-container">
                <div class="table-responsive">
                    <table class="products-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Image</th>
                                <th>Product Name</th>
                                <th>Category</th>
                                <th>Price (KES)</th>
                                <th>Stock</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="products-table-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="product-modal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
        <div class="modal-content" style="background:white; padding:30px; border-radius:10px; max-width:600px; width:90%; max-height:90vh; overflow-y:auto;">
            <h3 id="modal-title" style="margin-bottom:20px;">Add New Product</h3>
            <form id="product-form">
                <input type="hidden" id="product-id">
                
                <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
                    <div class="form-group">
                        <label>Product Name *</label>
                        <input type="text" id="product-name" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">
                    </div>
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="product-category" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">
                            <option value="">Select Category</option>
                            <option value="1">Electronics</option>
                            <option value="2">Fashion</option>
                            <option value="3">Home & Living</option>
                            <option value="4">Agriculture</option>
                        </select>
                    </div>
                </div>

                <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
                    <div class="form-group">
                        <label>Price (KES) *</label>
                        <input type="number" id="product-price" required min="0" step="0.01" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">
                    </div>
                    <div class="form-group">
                        <label>Stock Quantity *</label>
                        <input type="number" id="product-stock" required min="0" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">
                    </div>
                </div>

                <!-- IMAGE UPLOAD SECTION - NEW -->
                <div class="form-group" style="margin-bottom:15px;">
                    <label>Product Image</label>
                    <div style="border:2px dashed #ddd; padding:20px; border-radius:5px; text-align:center;">
                        <input type="file" id="product-image-file" accept="image/*" style="display:none;" onchange="previewImage(this)">
                        <div id="image-preview-container" style="margin-bottom:10px;">
                            <img id="image-preview" src="" style="max-width:200px; max-height:200px; display:none; border-radius:5px;">
                            <p id="image-placeholder" style="color:#999; margin:0;">
                                <i class="fas fa-cloud-upload-alt" style="font-size:2em;"></i><br>
                                Click to upload image from your computer
                            </p>
                        </div>
                        <button type="button" onclick="document.getElementById('product-image-file').click()" class="btn-secondary" style="padding:8px 15px;">
                            <i class="fas fa-upload"></i> Choose File
                        </button>
                        <p id="selected-filename" style="margin-top:10px; font-size:0.9em; color:#666;"></p>
                    </div>
                    <!-- Hidden field to store the image URL after upload -->
                    <input type="hidden" id="product-image-url">
                </div>

                <div class="form-group" style="margin-bottom:15px;">
                    <label>Description</label>
                    <textarea id="product-description" rows="3" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;"></textarea>
                </div>

                <div class="form-group checkbox-group" style="margin-bottom:20px;">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                        <input type="checkbox" id="product-active" checked style="width:auto;">
                        <span>Active</span>
                    </label>
                </div>

                <div class="modal-actions" style="display:flex; justify-content:flex-end; gap:10px;">
                    <button type="button" onclick="closeModal()" class="btn-secondary" style="padding:10px 20px;">Cancel</button>
                    <button type="submit" class="btn-primary" style="padding:10px 20px;">
                        <i class="fas fa-save"></i> Save Product
                    </button>
                </div>
            </form>
        </div>
    </div>

    

    <script>
    (function(){
        var sb = document.getElementById('admin-sidebar');
        var ham = document.getElementById('admin-ham');
        var ov = document.getElementById('admin-overlay');
        
        window.toggleSidebar = function() {
            if (!sb) { alert('Sidebar not found!'); return; }
            var isOpen = sb.style.left === '0px';
            if (isOpen) {
                sb.style.left = '-260px';
                if (ov) ov.style.display = 'none';
                document.body.style.overflow = '';
            } else {
                sb.style.left = '0px';
                if (ov) ov.style.display = 'block';
                document.body.style.overflow = 'hidden';
            }
        };
        
        // Show hamburger on mobile
        function checkMobile() {
            if (ham) {
                if (window.innerWidth <= 768) {
                    ham.style.display = 'block';
                } else {
                    ham.style.display = 'none';
                    // Reset sidebar on desktop
                    if (sb) sb.style.left = '';
                    if (ov) ov.style.display = 'none';
                    document.body.style.overflow = '';
                }
            }
        }
        
        window.addEventListener('resize', checkMobile);
        document.addEventListener('DOMContentLoaded', checkMobile);
        
        // Close sidebar when clicking links
        if (sb) {
            sb.querySelectorAll('a').forEach(function(a){
                a.addEventListener('click', function(){
                    if (window.innerWidth <= 768) toggleSidebar();
                });
            });
        }
    })();
    </script>
</body>
</html>
